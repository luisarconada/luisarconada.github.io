# Site settings
title: "Luis Arconada Sousa - Data Analyst"
description: "Personal portfolio of a Data Analyst with 4 years of experience."
url: "" # Set your custom domain if you have one, otherwise leave empty
baseurl: "" # Leave empty for GitHub Pages root

# Author
author:
  name: "Luis Arconada Sousa"
  email: "luis.arconada98@gmail.com"
  github: "luisarconada"
  linkedin: "luis-arconada-sousa"

# Build settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle

# Defaults for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Google Fonts (you can add more)
google_fonts:
  - "Inter:400,600,700"

# Navigation menu (optional, if you want dynamic menus)
menu:
  - name: "About"
    link: "#about"
  - name: "Experience"
    link: "#experience"
  - name: "Projects"
    link: "#projects"
  - name: "Skills"
    link: "#skills"
  - name: "Contact"
    link: "#contact"